name: Terraform CI/CD


on:
  # .tf もしくは .yamlファイル変更時のみ。
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'
      - '.github/workflows/*.yaml'

  push:
    branches: [main]
    paths:
      - '**/*.tf'
      - '.github/workflows/*.yaml'
jobs:
  terraform-plan:
    # プルリクエスト時、 plan 実行
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-1

    permissions:
      id-token: write
      contents: read  

    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1 

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform plan

  terraform-apply:
    # マージされた時、apply 実行
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      ec2_ip: ${{ steps.tf-ec2-ip.outputs.ec2_ip }}

    env:
      AWS_REGION: ap-northeast-1

    permissions:
      id-token: write
      contents: read        

    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1           

      - run: terraform init
      - run: terraform apply -auto-approve

      - name: Get EC2 IP
        id: tf-ec2-ip
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  ansible-build:
    needs: terraform-apply  
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-1
      EC2_IP: ${{ needs.terraform-apply.outputs.ec2_ip }}

    permissions:
      id-token: write
      contents: read        

    steps:    
      - uses: actions/checkout@v5
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Debug SSH
        run: |
          set -x
          mkdir -p ~/.ssh
          echo "HOME=$HOME"
          ls -la ~

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts

      - name: Wait for SSH
        run: |
          for i in {1..30}; do
            nc -zv $EC2_IP 22 && exit 0
            echo "waiting for ssh..."
            sleep 10
          done
          exit 1

      - name: Create inventory
        run: |
          echo "[web]" > inventory
          echo "$EC2_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory

      - name: Run Ansible
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory ansible/playbook.yaml